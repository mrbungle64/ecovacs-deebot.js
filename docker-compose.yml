version: '3.3'

services:
  ecovacs:
    image: node:20-bookworm-slim
    volumes:
      - ./:/opt/app
    tty: true
    stdin_open: true
    environment:
      - NODE_ENV=development
      - ECOVACS_ACCOUNT_ID
      - ECOVACS_PASSWORD
      - ECOVACS_DEVICE_NUMBER
      - ECOVACS_COUNTRY_CODE
    working_dir: /opt/app
    command: bash -c 'npm install && node example/app2'
